name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Typecheck, Smoke Test, Demo, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug checkout
        run: |
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "Fresh latest-main check trigger"
          git status
          git rev-parse HEAD
          git branch --show-current
          echo "--- src/index.ts ---"
          sed -n '1,60p' src/index.ts
          echo "--- src/core.ts ---"
          sed -n '1,90p' src/core.ts
          echo "--- src/specialPoints/nodes.ts ---"
          sed -n '1,5p' src/specialPoints/nodes.ts
          echo "--- src/interpretation/nodeSynthesis.ts ---"
          sed -n '1,8p' src/interpretation/nodeSynthesis.ts
          echo "--- package.json scripts ---"
          cat package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Smoke test
        run: npm run smoke

      - name: Demo
        run: npm run demo

      - name: Build
        run: npm run build
